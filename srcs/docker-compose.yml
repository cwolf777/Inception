services:
  mariadb:
    build: ./requirements/mariadb
    image: mariadb:incpetion
    restart: unless-stopped
    env_file: ./requirements/.env
    volumes:
      - mariadb_data:/var/lib/mysql
    networks:
      - inception_network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-p$${ROOTPASS}", "--silent"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
  wordpress:
    build: ./requirements/wordpress
    image: wordpress:incpetion
    restart: unless-stopped
    env_file: ./requirements/.env
    depends_on:
      mariadb:
        condition: service_healthy
    volumes:
      - wordpress_data:/var/www/html
    networks:
      - inception_network

  nginx:
    build: ./requirements/nginx
    image: nginx:incpetion
    restart: unless-stopped
    depends_on:
      - wordpress
    volumes:
      - wordpress_data:/var/www/html
    ports:
      - "443:443"
    networks:
      - inception_network

volumes:
  mariadb_data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /home/cwolf/data/mariadb
  wordpress_data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /home/cwolf/data/wordpress

networks:
  inception_network:
    driver: bridge